<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <title>Three.js</title>
</head>

<body class="w-full h-full m-0 p-0 overflow-hidden">
    <!-- 關卡功能 -->
    <div class="w-full absolute top-0 z-50 bg-amber-600">
        <div>
            <select id="scene-select" class="w-120 m-2 p-1"></select>
            <select id="player-select" class="w-40 m-2 p-1"></select>
            <button id="load-scene" class="m-2 p-1 bg-blue-500 text-white rounded-xl cursor-pointer">載入場景</button>
            <button id="reset-game" class="m-2 p-1 bg-red-500 text-white rounded-xl cursor-pointer">重置</button>
            <button id="start-game" class="m-2 p-1 bg-green-500 text-white rounded-xl cursor-pointer">開始</button>
        </div>

        <div id="coord-display" class="text-white font-mono bg-black/20 px-2 py-1 rounded">
            X: 0.00, Z: 0.00
        </div>
    </div>

    <!-- 狀態顯示 -->
    <div id="status-effects-container"
        class="absolute top-1/2 left-1/6 -translate-x-1/2 -translate-y-1/2 z-50 flex flex-col items-start gap-4 w-75">
        <!-- 固定 Buffs 區塊：與技能欄寬度一致並水平對齊 -->
        <div class="buff-group min-h-15 flex flex-col items-start w-full">
            <!-- <div class="text-[10px] text-blue-400 mb-1 font-bold uppercase tracking-wider">Buffs</div> -->
            <div class="status-list flex flex-wrap gap-1"></div>
        </div>
        <!-- 固定 Debuffs 區塊 -->
        <div class="debuff-group min-h-15 flex flex-col items-start w-full">
            <!-- <div class="text-[10px] text-red-400 mb-1 font-bold uppercase tracking-wider">Debuffs</div> -->
            <div class="status-list flex flex-wrap gap-1"></div>
        </div>
    </div>

    <!-- 技能顯示：寬度約 632px (12格*48px + 間隔) -->
    <div id="action-bar"
        class="absolute bottom-10 left-1/2 -translate-x-1/2 z-50 flex gap-1 bg-black/40 p-2 rounded-t-lg border-x border-t border-white/20">
    </div>

    <div id="three-container" class="w-screen h-screen"></div>

    <script type="module" src="./resources/js/app.js"></script>

</body>

</html>
